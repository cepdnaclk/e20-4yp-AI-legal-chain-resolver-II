<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legal Chain Resolver</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  </head>
  <body>
    <div class="bg-orbit"></div>
    <main class="page">
      <header class="hero">
        <div class="brand">
          <span class="brand-dot"></span>
          <div class="brand-text">
            <p class="brand-kicker">AI Legal Assistant</p>
            <h1>Legal Chain Resolver</h1>
          </div>
        </div>
        <p class="hero-sub">
          Ask Sinhala legal questions and get grounded answers with citations.
        </p>
      </header>

      <section class="chat-shell">
        <div class="chat-header">
          <div>
            <p class="chat-title">Conversation</p>
            <p class="chat-status">Online • Secure retrieval</p>
          </div>
          <label class="rag-toggle">
            <input id="ragToggle" type="checkbox" checked />
            <span class="rag-track" aria-hidden="true"></span>
            <span class="rag-label">RAG Enabled</span>
          </label>
        </div>

        <div id="chat" class="chat-log">
          <div class="message assistant">
            <div class="bubble">
              Hello! Ask me about Sri Lankan commercial law or a specific act or section.
            </div>
          </div>
        </div>

        <form id="chatForm" class="composer">
          <div class="input-wrap">
            <textarea
              id="queryInput"
              rows="1"
              placeholder="Type your question in Sinhala..."
              autocomplete="off"
            ></textarea>
          </div>
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
